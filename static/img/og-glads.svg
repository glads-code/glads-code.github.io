<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="60%" r="38%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#07090e"/>

  <!-- Ambient glows -->
  <ellipse cx="180" cy="280" rx="320" ry="320" fill="#3b82f6" opacity="0.12" filter="url(#blur1)"/>
  <ellipse cx="1020" cy="370" rx="290" ry="290" fill="#8b5cf6" opacity="0.12" filter="url(#blur1)"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#lineGrad)"/>

  <!-- Logo mark — architectural G silhouette (geometric) -->
  <g transform="translate(390, 180)" opacity="0.9">
    <!-- Stylized building/architecture mark -->
    <rect x="0" y="60" width="12" height="70" fill="white" opacity="0.5" rx="1"/>
    <rect x="18" y="40" width="12" height="90" fill="white" opacity="0.6" rx="1"/>
    <rect x="36" y="20" width="12" height="110" fill="white" opacity="0.7" rx="1"/>
    <rect x="54" y="35" width="12" height="95" fill="white" opacity="0.65" rx="1"/>
    <rect x="72" y="50" width="12" height="80" fill="white" opacity="0.55" rx="1"/>
    <!-- Ground line -->
    <rect x="0" y="130" width="84" height="2" fill="white" opacity="0.4" rx="1"/>
  </g>

  <!-- GLADS main text -->
  <text x="600" y="310"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="148"
        font-weight="900"
        fill="url(#textGrad)"
        letter-spacing="12">GLADS</text>

  <!-- Subtitle -->
  <text x="600" y="375"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="26"
        font-weight="400"
        fill="#9ca3af"
        letter-spacing="4">ARCHITECTURE · DÉVELOPPEMENT · SÉCURITÉ</text>

  <!-- Separator -->
  <rect x="510" y="408" width="180" height="2" fill="url(#lineGrad)" rx="1" opacity="0.7"/>

  <!-- Bottom label -->
  <text x="600" y="455"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="22"
        font-weight="500"
        fill="#6b7280"
        letter-spacing="2">Cabinet de Conseil IT · Saint-Maximin, Var</text>

  <!-- Badge pill -->
  <rect x="486" y="478" width="228" height="44" rx="22"
        fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.35"/>
  <text x="600" y="505"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="17"
        font-weight="600"
        fill="#3b82f6"
        letter-spacing="1">glads.fr · PACA · France</text>

  <!-- Border frame -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
</svg>
